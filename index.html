<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js-email-list</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/index.css">
</head>

<body>
    <main class="container">
        <div class="row p-4">
            <div class="col-9">
                <h1 class="text-dark-emphasis">Email List</h1>
            </div>
            <form class="col-3 mt-2" id="email-form">
                <div class="input-group mb-3">
                    <input type="number" class="form-control" id="email-count" min="1" max="20" required>
                    <button class="btn btn-outline-success" type="submit" id="mails-btn">Genera</button>
                </div>
            </form>
        </div>

        <div>
            <ul id="email-list" class="list-group row">

            </ul>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script/script.js"></script>
</body>

</html>
